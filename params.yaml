# Общие параметры
general:
  random_state: 42
  train_size: 0.7
  val_size: 0.2
  test_size: 0.1
  correlation_threshold: 0.3

# Линейная регрессия
linear_regression:
  fit_intercept: true
  positive: false

# Дерево решений
decision_tree:
  max_depth: 5
  min_samples_split: 10
  min_samples_leaf: 25
  random_state: 42

# CatBoost
catboost:
  iterations: 1000
  learning_rate: 0.05
  depth: 9
  l2_leaf_reg: 4.0
  random_seed: 42

# XGBoost
xgboost:
  n_estimators: 1100
  learning_rate: 0.05
  max_depth: 9
  subsample: 0.8
  colsample_bytree: 0.6
  reg_alpha: 0.5
  reg_lambda: 5.0
  random_state: 42
  early_stopping_rounds: 20
  eval_metric: rmse

# Нейронная сеть
neural_network:
  epochs: 100
  batch_size: 16
  learning_rate: 0.005
  layer_1_neurons: 120
  layer_2_neurons: 60
  layer_3_neurons: 30
  activation: relu
  dropout_rate: 0.1
  patience: 20
  random_state: 42