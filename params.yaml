general:
  random_state: 42
  test_size: 0.1
  train_size: 0.7
  val_size: 0.2

preprocessing:
  normalization_method: minmax
  normalize: true

linear_regression:
  fit_intercept: true
  positive: false

decision_tree:
  max_depth: 7
  min_samples_leaf: 10
  min_samples_split: 50
  random_state: 42

catboost:
  depth: 6
  iterations: 1500
  l2_leaf_reg: 9.82
  learning_rate: 0.272
  random_seed: 42

xgboost:
  colsample_bytree: 1
  early_stopping_rounds: 20
  eval_metric: rmse
  learning_rate: 0.0872
  max_depth: 6
  n_estimators: 2000
  random_state: 42
  reg_alpha: 0.8
  reg_lambda: 2
  subsample: 1

neural_network:
  activation: relu
  batch_size: 16
  dropout_rate: 0.129
  epochs: 100
  layer_1_neurons: 192
  layer_2_neurons: 48
  layer_3_neurons: 64
  learning_rate: 0.003
  patience: 21
  random_state: 42
