# Общие параметры
general:
  random_state: 42
  test_size: 0.2
  correlation_threshold: 0.3

# Линейная регрессия
linear_regression:
  fit_intercept: true
  positive: false

# Дерево решений
decision_tree:
  max_depth: 5
  min_samples_split: 30
  min_samples_leaf: 10
  random_state: 42

# CatBoost
catboost:
  iterations: 700
  learning_rate: 0.03
  depth: 7
  l2_leaf_reg: 3.0
  random_seed: 42

  # XGBoost
xgboost:
  n_estimators: 500
  learning_rate: 0.03
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42

  # Нейронная сеть (sklearn MLPRegressor)
neural_network:
  hidden_layer_sizes: [64, 32, 16]  # Три скрытых слоя
  activation: 'relu'                  # Функция активации
  solver: 'adam'                      # Оптимизатор
  alpha: 0.0001                       # L2 регуляризация
  batch_size: 32                      # Размер батча
  learning_rate_init: 0.001          # Начальная скорость обучения
  max_iter: 500                       # Максимум итераций
  early_stopping: true                # Ранняя остановка
  validation_fraction: 0.1           # Доля данных для валидации
  n_iter_no_change: 20                # Терпение для early stopping
  random_state: 42