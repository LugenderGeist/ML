# Общие параметры
general:
  random_state: 42
  train_size: 0.7
  val_size: 0.2
  test_size: 0.1
  correlation_threshold: 0.3

# Линейная регрессия
linear_regression:
  fit_intercept: true
  positive: false

# Дерево решений
decision_tree:
  max_depth: 5
  min_samples_split: 20
  min_samples_leaf: 10
  random_state: 42

# CatBoost
catboost:
  iterations: 500
  learning_rate: 0.03
  depth: 6
  l2_leaf_reg: 3.0
  random_seed: 42

# XGBoost
xgboost:
  n_estimators: 500
  learning_rate: 0.03
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  early_stopping_rounds: 20
  eval_metric: 'rmse'

# Нейронная сеть (TensorFlow)
neural_network:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  layer_1_neurons: 64
  layer_2_neurons: 32
  layer_3_neurons: 16
  activation: 'relu'
  dropout_rate: 0.2
  patience: 20
  random_state: 42